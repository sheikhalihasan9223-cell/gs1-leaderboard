<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<title>GS1 Saudi Arabia — Employee Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f4f8;font-family:'Rajdhani',sans-serif;color:#0d1f3c}

/* ── HEADER ── */
.header{padding:12px 40px;background:#fff;border-bottom:3px solid #00529b;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px rgba(0,82,155,0.08)}
.header-left{display:flex;align-items:center;gap:20px}
.logo-img{height:52px;object-fit:contain}
.divider{width:2px;height:44px;background:linear-gradient(180deg,#00529b,#e3231c);border-radius:2px;opacity:0.4}
.title-block .title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:800;color:#00529b;letter-spacing:2px}
.title-block .sub{font-size:11px;color:#7a9ab5;letter-spacing:3px;margin-top:1px;text-transform:uppercase}
.hright{display:flex;align-items:center;gap:20px}
.clock{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:#0d1f3c}
.pills{display:flex;gap:8px}
.pill{background:#f0f4f8;border:1.5px solid #d0dce8;border-radius:20px;padding:4px 14px;font-size:13px;color:#5a7a99;font-weight:600}
.pill span{color:#00529b;font-weight:700}

/* ── SLIDE AREA ── */
.slide-area{position:fixed;left:0;right:0;display:flex;flex-direction:column;justify-content:center;padding:20px 50px;gap:14px}

/* ── SLIDE ── */
.slide{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease, transform 0.7s ease}
.slide.show{opacity:1;transform:translateY(0)}
.slide.hide{opacity:0;transform:translateY(-30px)}

/* ── EMPLOYEE CARD ── */
.emp-card{background:#fff;border:2px solid #d0dce8;border-radius:18px;padding:18px 30px;display:flex;align-items:center;gap:24px;box-shadow:0 2px 12px rgba(0,82,155,0.06)}
.emp-card.top1{background:linear-gradient(90deg,#fffbf0,#fff7e0);border-color:#f5c842;box-shadow:0 4px 24px rgba(245,200,66,0.2)}
.emp-card.top2{background:linear-gradient(90deg,#f0f6ff,#e8f0fa);border-color:#00529b;box-shadow:0 3px 16px rgba(0,82,155,0.15)}
.emp-card.top3{background:linear-gradient(90deg,#fff8f0,#fff2e8);border-color:#e3231c;box-shadow:0 3px 16px rgba(227,35,28,0.1)}
.emp-card.zero{background:#f8fafc;border-color:#e0e8f0;opacity:0.75}

.rank-badge{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:800;min-width:70px;text-align:center;color:#b0c4d8;line-height:1}
.rank-badge.gold{color:#d4a800}
.rank-badge.silver{color:#8a9ab5}
.rank-badge.bronze{color:#c87040}

.emp-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #d0dce8;flex-shrink:0}
.emp-photo-placeholder{width:90px;height:90px;border-radius:50%;background:#e8eef5;border:3px dashed #c0ccd8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:38px}
.emp-card.top1 .emp-photo{border-color:#f5c842}
.emp-card.top2 .emp-photo{border-color:#00529b}
.emp-card.top3 .emp-photo{border-color:#e3231c}

.emp-info{flex:1}
.emp-name{font-family:'Cairo',sans-serif;font-size:52px;font-weight:900;direction:rtl;color:#0d1f3c;line-height:1.1}
.emp-card.zero .emp-name{color:#e3231c}
.emp-card.top1 .emp-name{color:#b8860b}
.emp-card.top2 .emp-name{color:#00529b}
.emp-card.top3 .emp-name{color:#c0392b}

.emp-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.emp-earn{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:800;color:#0d1f3c}
.emp-card.top1 .emp-earn{color:#b8860b}
.emp-card.top2 .emp-earn{color:#00529b}
.emp-card.top3 .emp-earn{color:#c0392b}
.emp-card.zero .emp-earn{color:#c0cdd8}
.emp-bar-wrap{width:180px;height:10px;background:#e8eef5;border-radius:99px;overflow:hidden}
.emp-bar{height:100%;border-radius:99px}
.medal-icon{font-size:32px}

/* ── PAGE INDICATOR ── */
.page-indicator{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;background:#c0cdd8;transition:all 0.3s}
.dot.active{background:#00529b;width:28px;border-radius:5px}

/* ── FOOTER ── */
.footer{position:fixed;bottom:0;left:0;right:0;background:#00529b;padding:6px 0;overflow:hidden}
.ticker-inner{display:flex;gap:50px;white-space:nowrap;animation:ticker 60s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.titem{font-size:13px;color:rgba(255,255,255,0.75);flex-shrink:0;font-family:'Cairo',sans-serif}
.titem b{color:#f5c842;font-family:'Rajdhani',sans-serif}
.titem.tz{color:rgba(255,255,255,0.3)}
.titem.tz b{color:rgba(255,255,255,0.2)}
</style>
</head>

<script>

};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── TRANSLATIONS ──
const LANG = {
  en: {
    title: '🏆 EMPLOYEE LEADERBOARD',
    employees: 'Employees',
    teamTotal: 'Team Total',
    monthlyEarnings: 'Monthly Earnings',
    place1: '1st Place', place2: '2nd Place', place3: '3rd Place',
    noEarnings: 'No Earnings',
    currency: ' SAR',
    zero: '0 SAR',
    dir: 'ltr',
    months: ['January','February','March','April','May','June','July','August','September','October','November','December']
  },
  ar: {
    title: '🏆 لوحة المتصدرين',
    employees: 'الموظفون',
    teamTotal: 'إجمالي الفريق',
    monthlyEarnings: 'أرباح الشهر',
    place1: 'المركز الأول', place2: 'المركز الثاني', place3: 'المركز الثالث',
    noEarnings: 'لا توجد أرباح',
    currency: ' ريال',
    zero: '٠ ريال',
    dir: 'rtl',
    months: ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']
  }
};
let currentLang = 'en';

function T(){ return LANG[currentLang]; }

function fmtLang(n){
  const t = T();
  return n === 0 ? t.zero : n.toLocaleString('en-US') + t.currency;
}

function applyLang(){
  const t = T();
  document.documentElement.setAttribute('dir', t.dir);
  document.getElementById('main-title').textContent = t.title;
  document.getElementById('lbl-employees').textContent = t.employees + ':';
  document.getElementById('lbl-teamtotal').textContent = t.teamTotal + ':';
  if(DATA.length > 0) renderAll(DATA, currentSettings);
}

// ── LANGUAGE LISTENER from Firestore ──
db.collection('leaderboard').doc('control').onSnapshot(doc=>{
  if(doc.exists){
    const d = doc.data();
    isPaused = d.scroll === 'pause';
    const lang = d.lang || 'en';
    if(lang !== currentLang){
      currentLang = lang;
      applyLang();
    }
  }
});

const COLORS=['#00529b','#e3231c','#34a853','#7b2d8b','#0288d1','#f57c00','#00796b','#558b2f','#c62828','#6a1f96'];
const PER_PAGE = 5;
let DATA = [];
let photoMap = {};
let currentPage = 0;
let totalPages = 0;
let slideTimer = null;
let isPaused = false;
let currentSettings = {};

function fmt(n){ return n===0 ? '٠ ريال' : n.toLocaleString('en-US')+' ريال'; }

setInterval(()=>{ document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB'); }, 1000);

function getRankClass(rank){
  if(rank===1) return 'top1';
  if(rank===2) return 'top2';
  if(rank===3) return 'top3';
  return '';
}

function getRankBadgeClass(rank){
  if(rank===1) return 'gold';
  if(rank===2) return 'silver';
  if(rank===3) return 'bronze';
  return '';
}

function getMedal(rank){
  if(rank===1) return '🥇';
  if(rank===2) return '🥈';
  if(rank===3) return '🥉';
  return '';
}

function buildSlides(){
  const area = document.getElementById('slide-area');
  const indic = document.getElementById('page-indicator');
  const maxE = DATA[0] ? DATA[0].total : 1;

  // Calculate available height for cards
  const headerH = document.querySelector('.header').offsetHeight;
  const footerH = document.querySelector('.footer').offsetHeight + 30;
  const availH = window.innerHeight - headerH - footerH - 40;
  const cardH = Math.floor(availH / PER_PAGE) - 14;
  const photoSize = Math.min(Math.floor(cardH * 0.72), 110);
  const nameFontSize = Math.min(Math.floor(cardH * 0.42), 58);
  const earnFontSize = Math.min(Math.floor(cardH * 0.38), 52);
  const rankFontSize = Math.min(Math.floor(cardH * 0.48), 60);

  area.innerHTML = '';
  indic.innerHTML = '';
  totalPages = Math.ceil(DATA.length / PER_PAGE);

  for(let p = 0; p < totalPages; p++){
    const pageDiv = document.createElement('div');
    pageDiv.className = 'slide';
    pageDiv.id = 'slide-'+p;
    pageDiv.style.cssText = 'display:flex;flex-direction:column;gap:12px';

    const group = DATA.slice(p * PER_PAGE, (p+1) * PER_PAGE);
    group.forEach((e, gi) => {
      const rank = p * PER_PAGE + gi + 1;
      const isZero = e.total === 0;
      const rankClass = isZero ? 'zero' : getRankClass(rank);
      const ci = (rank-1) % COLORS.length;
      const color = isZero ? '#c0cdd8' : COLORS[ci];
      const pct = maxE > 0 ? Math.round(e.total / maxE * 100) : 0;
      const photo = photoMap[e.name];
      const medal = getMedal(rank);

      const card = document.createElement('div');
      card.className = `emp-card ${rankClass}`;
      card.style.cssText = `padding:${Math.floor(cardH*0.1)}px 28px;border-radius:16px;min-height:${cardH}px`;
      card.innerHTML = `
        <div class="rank-badge ${getRankBadgeClass(rank)}" style="font-size:${rankFontSize}px;min-width:${rankFontSize+20}px">${rank}</div>
        ${photo
          ? `<img class="emp-photo" src="${photo}" style="width:${photoSize}px;height:${photoSize}px"/>`
          : `<div class="emp-photo-placeholder" style="width:${photoSize}px;height:${photoSize}px;font-size:${Math.floor(photoSize*0.42)}px">👤</div>`
        }
        <div class="emp-info">
          <div class="emp-name" style="font-size:${nameFontSize}px">${e.name}</div>
        </div>
        <div class="emp-right">
          <div style="display:flex;align-items:center;gap:8px">
            ${medal ? `<span style="font-size:${Math.floor(earnFontSize*0.65)}px">${medal}</span>` : ''}
            <div class="emp-earn" style="font-size:${earnFontSize}px;color:${color}">${fmtLang(e.total)}</div>
          </div>
          <div class="emp-bar-wrap" style="width:200px">
            <div class="emp-bar" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>`;
      pageDiv.appendChild(card);
    });

    area.appendChild(pageDiv);

    // Dot indicator
    const dot = document.createElement('div');
    dot.className = 'dot' + (p===0?' active':'');
    dot.id = 'dot-'+p;
    indic.appendChild(dot);
  }
}

function showPage(page){
  // Hide current
  const prev = document.getElementById('slide-'+currentPage);
  if(prev){
    prev.classList.remove('show');
    prev.classList.add('hide');
    setTimeout(()=>{ prev.classList.remove('hide'); prev.style.display='none'; }, 700);
  }
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));

  currentPage = page;
  const dot = document.getElementById('dot-'+currentPage);
  if(dot) dot.classList.add('active');

  const next = document.getElementById('slide-'+currentPage);
  if(next){
    next.style.display = 'flex';
    next.style.flexDirection = 'column';
    next.style.gap = '12px';
    setTimeout(()=>{ next.classList.add('show'); }, 50);
  }
}

function startSlideshow(){
  if(slideTimer) clearInterval(slideTimer);
  showPage(0);
  slideTimer = setInterval(()=>{
    if(!isPaused){
      const next = (currentPage + 1) % totalPages;
      showPage(next);
    }
  }, 5000);
}

function renderAll(employees, settings){
  DATA = employees;
  currentSettings = settings;
  const t = T();
  const empCount = settings.totalEmployees || DATA.length;
  document.getElementById('emp-count').textContent = empCount;
  document.getElementById('ttotal').textContent = DATA.reduce((s,e)=>s+e.total,0).toLocaleString('en-US') + t.currency;
  if(settings.month || settings.year){
    document.getElementById('header-sub').textContent = (settings.month||'') + ' ' + (settings.year||'') + ' — ' + t.monthlyEarnings;
  }

  // Ticker
  const tHTML = DATA.map(e=>`<span class="titem${e.total===0?' tz':''}">${e.name} <b>${fmtLang(e.total)}</b></span>`).join('<span style="color:rgba(255,255,255,0.2);margin:0 8px">|</span>');
  document.getElementById('ticker').innerHTML = tHTML+'<span style="margin:0 20px">  </span>'+tHTML;

  if(slideTimer) clearInterval(slideTimer);
  setTimeout(()=>{ buildSlides(); startSlideshow(); }, 200);
}

// Photos listener
db.collection('leaderboard').doc('photos').onSnapshot(doc=>{
  photoMap = doc.exists ? (doc.data().photos||{}) : {};
  if(DATA.length > 0){ buildSlides(); showPage(currentPage); }
});

// Data listener
db.collection('leaderboard').doc('current').onSnapshot(doc=>{
  if(doc.exists){
    const d = doc.data();
    const employees = (d.employees||[]).sort((a,b)=>b.total-a.total);
    renderAll(employees, d.settings||{});
  }
});

// Play/pause handled in lang listener above

window.addEventListener('resize', ()=>{ buildSlides(); showPage(currentPage); });
setInterval(()=>{const n=new Date();if(n.getHours()===0&&n.getMinutes()===0)location.reload();},60000);
</script>
