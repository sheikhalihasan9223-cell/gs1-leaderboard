<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<title>GS1 Saudi Arabia — Employee Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --blue:#1a6fd4;
  --blue2:#0a3d7a;
  --red:#e3231c;
  --gold:#f5c842;
  --g1:rgba(255,255,255,0.28);
  --g2:rgba(255,255,255,0.10);
  --gb:rgba(255,255,255,0.55);
  --gs:0 8px 32px rgba(0,40,120,0.18),inset 0 1.5px 0 rgba(255,255,255,0.70),inset 0 -1px 0 rgba(255,255,255,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Rajdhani',sans-serif}

/* ── BACKGROUND ── */
body{
  background:linear-gradient(160deg,#e8f0fb 0%,#f5f8ff 40%,#ffffff 100%);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 0% 0%,rgba(0,82,155,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%,rgba(0,82,155,0.05) 0%,transparent 60%);
}

/* ── GLASS BASE ── */
.g{
  background:linear-gradient(135deg,rgba(255,255,255,0.28) 0%,rgba(255,255,255,0.08) 100%);
  backdrop-filter:blur(28px) saturate(180%) brightness(1.05);
  -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(1.05);
  border:1.5px solid rgba(255,255,255,0.45);
  box-shadow:
    0 8px 32px rgba(0,30,100,0.22),
    inset 0 1.5px 0 rgba(255,255,255,0.75),
    inset 0 -1px 0 rgba(255,255,255,0.12),
    inset 1px 0 0 rgba(255,255,255,0.3);
}

/* ── HEADER ── */
.header{
  position:relative;z-index:10;padding:10px 36px;
  background:linear-gradient(135deg,rgba(255,255,255,0.32) 0%,rgba(255,255,255,0.12) 100%);
  backdrop-filter:blur(32px) saturate(200%) brightness(1.1);
  -webkit-backdrop-filter:blur(32px) saturate(200%) brightness(1.1);
  border-bottom:1.5px solid rgba(255,255,255,0.5);
  box-shadow:0 4px 24px rgba(0,20,80,0.2),inset 0 1.5px 0 rgba(255,255,255,0.8);
  display:flex;justify-content:space-between;align-items:center;
}
.header-left{display:flex;align-items:center;gap:18px}
.logo-img{height:50px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15))}
.divider{width:1.5px;height:44px;background:linear-gradient(180deg,rgba(255,255,255,0.7),rgba(255,255,255,0.15));border-radius:2px}
.title-block .title{font-size:24px;font-weight:800;color:#00529b;letter-spacing:3px;text-shadow:none}
.title-block .sub{font-size:11px;color:#7a9ab5;letter-spacing:3px;margin-top:2px;text-transform:uppercase}
.hright{display:flex;align-items:center;gap:12px}
.clock{
  font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:800;color:#0a1a3a;
  letter-spacing:2px;padding:5px 18px;
  background:linear-gradient(135deg,rgba(255,255,255,0.22),rgba(255,255,255,0.06));
  backdrop-filter:blur(16px);border-radius:16px;
  border:1.5px solid rgba(255,255,255,0.45);
  box-shadow:0 4px 16px rgba(0,20,80,0.2),inset 0 1.5px 0 rgba(255,255,255,0.6);
  text-shadow:0 2px 8px rgba(0,30,100,0.3);
}
.pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.pill{
  background:linear-gradient(135deg,rgba(255,255,255,0.25),rgba(255,255,255,0.08));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,0.45);border-radius:24px;padding:5px 16px;
  font-size:13px;color:#5a7a99;font-weight:700;
  display:flex;align-items:center;gap:5px;
  box-shadow:0 4px 14px rgba(0,20,80,0.15),inset 0 1px 0 rgba(255,255,255,0.6);
}
.pill span{color:#00529b;font-weight:800;font-size:15px;text-shadow:none}
.pill.bank-pill{background:linear-gradient(135deg,rgba(200,170,255,0.3),rgba(150,100,255,0.15));border-color:rgba(200,170,255,0.5)}
.pill.bank-pill span{color:#6020cc}

/* ── PODIUM ── */
.podium-bar{
  position:relative;z-index:9;padding:12px 36px 14px;
  background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.06) 100%);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1.5px solid rgba(255,255,255,0.3);
  box-shadow:0 4px 20px rgba(0,20,80,0.15),inset 0 1px 0 rgba(255,255,255,0.5);
}
.podium-label{font-size:9px;letter-spacing:4px;color:#7a9ab5;text-align:center;margin-bottom:10px;text-transform:uppercase;font-weight:700}
.podium-grid{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:12px;max-width:1100px;margin:0 auto;align-items:end}

.pod{
  border-radius:24px;text-align:center;position:relative;overflow:hidden;
  backdrop-filter:blur(24px) saturate(200%);-webkit-backdrop-filter:blur(24px) saturate(200%);
  transition:transform 0.3s ease;padding:12px 10px;
}
/* glass shine overlay */
.pod::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:24px 24px 0 0;
  background:linear-gradient(180deg,rgba(255,255,255,0.35) 0%,rgba(255,255,255,0) 100%);
  pointer-events:none;z-index:1;
}
/* bottom reflection */
.pod::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;height:30%;border-radius:0 0 24px 24px;
  background:linear-gradient(0deg,rgba(255,255,255,0.08) 0%,transparent 100%);
  pointer-events:none;z-index:1;
}
.pod.p1{
  background:linear-gradient(160deg,rgba(255,240,140,0.45) 0%,rgba(255,200,40,0.25) 60%,rgba(200,150,0,0.15) 100%);
  border:1.5px solid rgba(255,220,60,0.6);
  box-shadow:0 12px 40px rgba(180,140,0,0.25),0 4px 12px rgba(0,0,0,0.1),inset 0 1.5px 0 rgba(255,255,255,0.8);
  padding:18px 10px;
}
.pod.p2{
  background:linear-gradient(160deg,rgba(180,220,255,0.4) 0%,rgba(100,180,255,0.2) 60%,rgba(0,100,220,0.12) 100%);
  border:1.5px solid rgba(120,190,255,0.55);
  box-shadow:0 8px 30px rgba(0,80,200,0.2),0 3px 10px rgba(0,0,0,0.08),inset 0 1.5px 0 rgba(255,255,255,0.7);
}
.pod.p3{
  background:linear-gradient(160deg,rgba(255,190,180,0.4) 0%,rgba(255,120,100,0.2) 60%,rgba(180,40,20,0.12) 100%);
  border:1.5px solid rgba(255,140,120,0.5);
  box-shadow:0 8px 30px rgba(160,40,20,0.18),0 3px 10px rgba(0,0,0,0.08),inset 0 1.5px 0 rgba(255,255,255,0.7);
}
.pod-medal{font-size:28px;display:block;margin-bottom:6px;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.2));position:relative;z-index:2}
.pod-photo-wrap{position:relative;display:inline-block;margin:0 auto 8px;z-index:2}
.pod-photo{border-radius:50%;object-fit:cover;display:block;box-shadow:0 8px 28px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.5)}
.pod-photo-ph{border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(255,255,255,0.35),rgba(255,255,255,0.1));
  box-shadow:0 6px 20px rgba(0,0,0,0.15)}
.pod-ring{position:absolute;inset:-6px;border-radius:50%;border:2.5px solid transparent;animation:spinRing 3.5s linear infinite;z-index:0}
.p1 .pod-photo,.p1 .pod-photo-ph{border:4px solid rgba(255,210,40,0.8)}
.p2 .pod-photo,.p2 .pod-photo-ph{border:4px solid rgba(80,170,255,0.75)}
.p3 .pod-photo,.p3 .pod-photo-ph{border:4px solid rgba(255,120,100,0.75)}
.p1 .pod-ring{border-top-color:rgba(255,210,40,0.9);border-right-color:rgba(255,210,40,0.35);border-left-color:rgba(255,210,40,0.15)}
.p2 .pod-ring{border-top-color:rgba(80,170,255,0.9);border-right-color:rgba(80,170,255,0.35);border-left-color:rgba(80,170,255,0.15)}
.p3 .pod-ring{border-top-color:rgba(255,120,100,0.9);border-right-color:rgba(255,120,100,0.35);border-left-color:rgba(255,120,100,0.15)}
@keyframes spinRing{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.pod-lbl{font-size:9px;letter-spacing:2px;color:#7a9ab5;text-transform:uppercase;font-weight:700;margin-bottom:2px;position:relative;z-index:2}
.pod-name{font-family:'Cairo',sans-serif;font-weight:900;direction:rtl;margin-bottom:3px;position:relative;z-index:2;
  text-shadow:0 2px 8px rgba(0,0,0,0.15)}
.p1 .pod-name{color:#7a5500;font-size:19px;text-shadow:none}
.p2 .pod-name{color:#003a8c;font-size:16px;text-shadow:none}
.p3 .pod-name{color:#8c1800;font-size:16px;text-shadow:none}
.pod-earn{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:800;position:relative;z-index:2}
.p1 .pod-earn{color:rgba(255,240,180,0.95)} .p2 .pod-earn{color:rgba(200,235,255,0.95)} .p3 .pod-earn{color:rgba(255,220,210,0.95)}

/* ── SLIDE AREA ── */
.slide-area{position:fixed;left:0;right:0;overflow:hidden;padding:14px 44px;display:flex;flex-direction:column;justify-content:center;gap:10px;z-index:5}
.slide{opacity:0;display:none;flex-direction:column;gap:10px}
.slide.show{opacity:1}.slide.hide{opacity:0}
@keyframes cardEnter{
  0%{opacity:0;transform:scale(0.84) translateY(22px);filter:blur(6px)}
  65%{opacity:1;transform:scale(1.02) translateY(-2px);filter:blur(0)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes cardExit{
  0%{opacity:1;transform:scale(1);filter:blur(0)}
  100%{opacity:0;transform:scale(0.9) translateY(-16px);filter:blur(5px)}
}
.card-entering{animation:cardEnter 0.6s cubic-bezier(.22,.68,0,1.2) forwards}
.card-exiting{animation:cardExit 0.32s ease-in forwards}

/* ── EMPLOYEE CARD ── */
.emp-card{
  background:linear-gradient(135deg,rgba(255,255,255,0.28) 0%,rgba(255,255,255,0.08) 100%);
  backdrop-filter:blur(24px) saturate(180%) brightness(1.05);
  -webkit-backdrop-filter:blur(24px) saturate(180%) brightness(1.05);
  border:1.5px solid rgba(255,255,255,0.48);
  border-radius:20px;padding:11px 26px;
  display:flex;align-items:center;gap:20px;
  box-shadow:
    0 6px 24px rgba(0,20,80,0.18),
    0 1px 4px rgba(0,20,80,0.1),
    inset 0 1.5px 0 rgba(255,255,255,0.75),
    inset 0 -1px 0 rgba(255,255,255,0.1);
  position:relative;overflow:hidden;
}
/* top shine */
.emp-card::after{
  content:'';position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.85),transparent);
}
/* left strip */
.emp-card::before{
  content:'';position:absolute;left:0;top:6px;bottom:6px;width:4px;
  background:linear-gradient(180deg,rgba(255,255,255,0.8),rgba(100,180,255,0.6));
  border-radius:0 4px 4px 0;
}
.emp-card.top1{
  background:linear-gradient(135deg,rgba(255,240,130,0.32) 0%,rgba(255,200,30,0.14) 100%);
  border-color:rgba(255,215,40,0.55);
  box-shadow:0 6px 28px rgba(180,140,0,0.18),inset 0 1.5px 0 rgba(255,255,200,0.7);
}
.emp-card.top1::before{background:linear-gradient(180deg,#ffd700,#ffaa00)}
.emp-card.top2{
  background:linear-gradient(135deg,rgba(160,210,255,0.3) 0%,rgba(80,160,255,0.12) 100%);
  border-color:rgba(100,190,255,0.5);
}
.emp-card.top2::before{background:linear-gradient(180deg,#60aaff,#0066ff)}
.emp-card.top3{
  background:linear-gradient(135deg,rgba(255,170,155,0.28) 0%,rgba(220,80,60,0.12) 100%);
  border-color:rgba(255,140,120,0.45);
}
.emp-card.top3::before{background:linear-gradient(180deg,#ff6644,#cc2200)}
.emp-card.zero{
  background:linear-gradient(135deg,rgba(255,255,255,0.14),rgba(255,255,255,0.04));
  border-color:rgba(255,255,255,0.25);opacity:0.72;
}
.emp-card.zero::before{background:linear-gradient(180deg,rgba(255,80,80,0.7),rgba(180,20,20,0.5))}

.rank-badge{font-family:'Rajdhani',sans-serif;font-weight:800;min-width:60px;text-align:center;
  color:#b0c4d8;line-height:1;text-shadow:none}
.rank-badge.gold{color:#c8980a;text-shadow:none}
.rank-badge.silver{color:#6a82a8;text-shadow:none}
.rank-badge.bronze{color:#a05020;text-shadow:none}

.emp-photo{border-radius:50%;object-fit:cover;flex-shrink:0;
  border:3px solid rgba(255,255,255,0.7);
  box-shadow:0 4px 16px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.6)}
.emp-photo-placeholder{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(255,255,255,0.25),rgba(255,255,255,0.08));
  border:3px solid rgba(255,255,255,0.4);
  box-shadow:0 3px 12px rgba(0,0,0,0.15)}

.emp-info{flex:1;min-width:0}
.emp-name{font-family:'Cairo',sans-serif;font-weight:900;direction:rtl;
  color:#00529b;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:none}
.emp-card.zero .emp-name{color:#e3231c;text-shadow:none}
.emp-card.top1 .emp-name{color:#7a5500;text-shadow:none}
.emp-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.emp-earn{font-family:'Rajdhani',sans-serif;font-weight:800;color:#00529b;text-shadow:none}
.emp-card.zero .emp-earn{color:#e3231c}
.emp-card.top1 .emp-earn{color:#7a5500;text-shadow:none}
.emp-bar-wrap{height:5px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.15)}
.emp-bar{height:100%;border-radius:99px;
  background:linear-gradient(90deg,#0066cc,#66aaff);box-shadow:none}
.emp-card.zero .emp-bar{background:linear-gradient(90deg,rgba(255,100,80,0.8),rgba(255,160,150,0.6))}
.emp-card.top1 .emp-bar{background:linear-gradient(90deg,rgba(255,210,40,0.9),rgba(255,240,140,0.8))}
.medal-icon{font-size:24px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2))}

/* ── PAGE DOTS ── */
.page-indicator{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:20}
.dot{width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.3);border:1.5px solid rgba(255,255,255,0.5);
  transition:all 0.35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.dot.active{background:rgba(255,255,255,0.85);width:28px;border-radius:5px;
  box-shadow:0 2px 12px rgba(255,255,255,0.4)}

/* ── FOOTER ── */
.footer{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(135deg,rgba(0,20,70,0.75),rgba(0,40,100,0.65));
  backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
  border-top:1.5px solid rgba(255,255,255,0.2);
  padding:9px 0;overflow:hidden;z-index:20;
  box-shadow:0 -4px 24px rgba(0,10,50,0.3),inset 0 1px 0 rgba(255,255,255,0.15);
}
.ticker-track{display:flex;gap:0;white-space:nowrap;animation:ticker 30s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.titem{font-size:18px;color:rgba(255,255,255,0.88);flex-shrink:0;font-family:'Cairo',sans-serif;
  padding:0 30px;border-right:1px solid rgba(255,255,255,0.12);
  display:inline-flex;align-items:center;gap:10px}
.titem b{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:800;
  text-shadow:0 0 14px rgba(245,200,66,0.6)}
.titem .tidot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;
  box-shadow:0 0 10px rgba(245,200,66,0.7),0 0 4px rgba(245,200,66,0.4)}
</style>
</head>

const firebaseConfig = {
  apiKey: "AIzaSyC5hcg2loY4VNzcmNATPIUBCVNTQKGTSro",

  measurementId: "G-E14DR9BZQ8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── TRANSLATIONS ──
const LANG = {
  en:{title:'🏆 EMPLOYEE LEADERBOARD',employees:'Employees',teamTotal:'Team Total',bankTotal:'Bank Total',
    monthlyEarnings:'Monthly Earnings',place1:'1st Place',place2:'2nd Place',place3:'3rd Place',
    topPerformers:'✨ Top Performers',currency:' SAR',zero:'0 SAR',dir:'ltr'},
  ar:{title:'🏆 لوحة المتصدرين',employees:'الموظفون',teamTotal:'إجمالي الفريق',bankTotal:'إجمالي البنك',
    monthlyEarnings:'أرباح الشهر',place1:'المركز الأول',place2:'المركز الثاني',place3:'المركز الثالث',
    topPerformers:'✨ أفضل الموظفين',currency:' ريال',zero:'٠ ريال',dir:'rtl'}
};
let currentLang='en';
function T(){return LANG[currentLang];}
function fmtL(n){const t=T();return n===0?t.zero:n.toLocaleString('en-US')+t.currency;}
function displayName(arabicName){ return (currentLang==='en' && engNameMap[arabicName]) ? engNameMap[arabicName] : arabicName; }

let DATA=[], photoMap={}, engNameMap={}, currentSettings={}, currentPage=0, totalPages=0, slideTimer=null, isPaused=false;
const PER_PAGE=5;

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB');},1000);

function getRankClass(r){return r===1?'top1':r===2?'top2':r===3?'top3':'';}
function getRankBadge(r){return r===1?'gold':r===2?'silver':r===3?'bronze':'';}
function getMedal(r){return r===1?'🥇':r===2?'🥈':r===3?'🥉':'';}

function renderPodium(){
  const t=T();
  const top3=DATA.slice(0,3);
  const order=[top3[1],top3[0],top3[2]];
  const medals=['🥈','🥇','🥉'];
  const pcls=['p2','p1','p3'];
  const plbls=[t.place2,t.place1,t.place3];
  // Photo sizes: 1st=150px, 2nd/3rd=110px
  const sizes=[110,150,110];
  document.getElementById('podium-label').textContent=t.topPerformers;
  document.getElementById('podium-grid').innerHTML=order.map((e,i)=>{
    if(!e) return '<div></div>';
    const sz=sizes[i];
    const photo=photoMap[e.name];
    return `<div class="pod ${pcls[i]}">
      <span class="pod-medal">${medals[i]}</span>
      <div class="pod-photo-wrap">
        ${photo
          ? `<img class="pod-photo" src="${photo}" style="width:${sz}px;height:${sz}px"/>`
          : `<div class="pod-photo-ph" style="width:${sz}px;height:${sz}px;font-size:${Math.floor(sz*0.4)}px">👤</div>`
        }
        <div class="pod-glow"></div>
      </div>
      <div class="pod-lbl">${plbls[i]}</div>
      <div class="pod-name">${displayName(e.name)}</div>
      <div class="pod-earn">${fmtL(e.total)}</div>
    </div>`;
  }).join('');
}

function buildSlides(){
  const area=document.getElementById('slide-area');
  const indic=document.getElementById('page-indicator');
  const maxE=DATA[0]?DATA[0].total:1;
  const headerH=document.querySelector('.header').offsetHeight;
  const podiumH=document.getElementById('podium-bar').offsetHeight;
  const footerH=document.querySelector('.footer').offsetHeight+44;
  const availH=window.innerHeight-headerH-podiumH-footerH-24;
  const cardH=Math.floor(availH/PER_PAGE)-11;
  const photoSz=Math.min(Math.floor(cardH*0.72),100);
  const nameFz=Math.min(Math.floor(cardH*0.40),54);
  const earnFz=Math.min(Math.floor(cardH*0.36),48);
  const rankFz=Math.min(Math.floor(cardH*0.46),56);
  area.style.top=(headerH+podiumH)+'px';

  area.style.bottom=document.querySelector('.footer').offsetHeight+'px';
  area.innerHTML='';
  indic.innerHTML='';
  totalPages=Math.ceil(DATA.length/PER_PAGE);
  for(let p=0;p<totalPages;p++){
    const div=document.createElement('div');
    div.className='slide';div.id='slide-'+p;
    const group=DATA.slice(p*PER_PAGE,(p+1)*PER_PAGE);
    group.forEach((e,gi)=>{
      const rank=p*PER_PAGE+gi+1;
      const isZero=e.total===0;
      const rankClass=isZero?'zero':getRankClass(rank);
      const pct=maxE>0?Math.round(e.total/maxE*100):0;
      const photo=photoMap[e.name];
      const medal=getMedal(rank);
      const card=document.createElement('div');
      card.className=`emp-card ${rankClass}`;
      card.style.cssText=`padding:${Math.floor(cardH*0.09)}px 28px;min-height:${cardH}px;border-radius:18px`;
      card.innerHTML=`
        <div class="rank-badge ${getRankBadge(rank)}" style="font-size:${rankFz}px;min-width:${rankFz+14}px">${rank}</div>
        ${photo
          ? `<img class="emp-photo" src="${photo}" style="width:${photoSz}px;height:${photoSz}px"/>`
          : `<div class="emp-photo-placeholder" style="width:${photoSz}px;height:${photoSz}px;font-size:${Math.floor(photoSz*0.4)}px">👤</div>`
        }
        <div class="emp-info">
          <div class="emp-name" style="font-size:${nameFz}px">${displayName(e.name)}</div>
        </div>
        <div class="emp-right">
          <div style="display:flex;align-items:center;gap:10px">
            ${medal?`<span class="medal-icon" style="font-size:${Math.floor(earnFz*0.6)}px">${medal}</span>`:''}
            <div class="emp-earn" style="font-size:${earnFz}px">${fmtL(e.total)}</div>
          </div>
          <div class="emp-bar-wrap" style="width:210px">
            <div class="emp-bar" style="width:${pct}%"></div>
          </div>
        </div>`;
      div.appendChild(card);
    });
    area.appendChild(div);
    const dot=document.createElement('div');
    dot.className='dot'+(p===0?' active':'');dot.id='dot-'+p;
    indic.appendChild(dot);
  }
}

function showPage(page){
  // Exit current slide — cards fly out
  const prev=document.getElementById('slide-'+currentPage);
  if(prev){
    const prevCards=[...prev.querySelectorAll('.emp-card')];
    prevCards.forEach((c,i)=>{
      c.classList.remove('card-entering');
      setTimeout(()=>{c.classList.add('card-exiting');},i*40);
    });
    setTimeout(()=>{
      prev.classList.remove('show');
      prev.style.display='none';
      prevCards.forEach(c=>c.classList.remove('card-exiting'));
    },350+prevCards.length*40);
  }
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  currentPage=page;
  const dot=document.getElementById('dot-'+currentPage);
  if(dot)dot.classList.add('active');
  // Enter new slide — cards stagger in
  const next=document.getElementById('slide-'+currentPage);
  if(next){
    const delay=prev?400:0;
    setTimeout(()=>{
      next.style.display='flex';
      next.style.flexDirection='column';
      next.style.gap='11px';
      next.classList.add('show');
      const cards=[...next.querySelectorAll('.emp-card')];
      cards.forEach((c,i)=>{
        c.style.opacity='0';
        c.classList.remove('card-entering');
        setTimeout(()=>{
          c.style.opacity='';
          c.classList.add('card-entering');
        },i*90);
      });
    },delay);
  }
}

function startSlideshow(){
  if(slideTimer)clearInterval(slideTimer);
  showPage(0);
  slideTimer=setInterval(()=>{if(!isPaused)showPage((currentPage+1)%totalPages);},5000);
}

// Special employees — shown only in bottom bar
const SPECIAL_NAMES=['غلا ال حزام','مي سعيد','محمد الحلياني'];

function renderSpecialBar(allEmployees, t){
  const special = allEmployees.filter(e => SPECIAL_NAMES.includes(e.name));
  if(special.length === 0){ document.getElementById('special-bar').style.display='none'; return; }
  document.getElementById('special-bar').style.display='flex';

  const items = special.map(e=>`
    <span class="sitem">
      <span class="sitem-dot"></span>
      <span class="sitem-name">${e.name}</span>
      <span class="sitem-earn">${fmtL(e.total)}</span>
    </span>`).join('');
  document.getElementById('special-track').innerHTML = items + items;
}

function renderAll(employees, settings){
  // Store ALL employees separately — never lose them
  const allEmployees = employees.slice(); // copy
  // Only show non-special in main leaderboard
  DATA = allEmployees.filter(e => !SPECIAL_NAMES.includes(e.name.trim()));
  currentSettings = settings;
  const t = T();

  // Employee count
  document.getElementById('emp-count').textContent = settings.totalEmployees || allEmployees.length;

  // Team total = ALL employees including special 3
  const grandTotal = allEmployees.reduce((s, e) => s + e.total, 0);
  document.getElementById('ttotal').textContent = grandTotal.toLocaleString('en-US') + t.currency;

  // Bank total
  const bval = settings.bankTotal ? Number(settings.bankTotal) : 0;
  document.getElementById('banktotal').textContent = bval > 0 ? bval.toLocaleString('en-US') + t.currency : '--';
  document.getElementById('lbl-banktotal').textContent = t.bankTotal + ':';

  // Header subtitle
  if(settings.month || settings.year)
    document.getElementById('header-sub').textContent = (settings.month||'') + ' ' + (settings.year||'');

  // Ticker — show ONLY the 3 special employees
  const specialEmps = allEmployees.filter(e => SPECIAL_NAMES.includes(e.name.trim()));
  const tHTML = specialEmps.map(e =>
    `<span class="titem"><span class="tidot"></span>${e.name}&nbsp;<b>${fmtL(e.total)}</b></span>`
  ).join('');
  document.getElementById('ticker').innerHTML = tHTML + tHTML;

  renderPodium();
  if(slideTimer) clearInterval(slideTimer);
  setTimeout(() => { buildSlides(); startSlideshow(); }, 200);
}

function applyLang(){
  const t=T();
  document.documentElement.setAttribute('dir',t.dir);
  document.getElementById('main-title').textContent=t.title;
  document.getElementById('lbl-employees').textContent=t.employees+':';
  document.getElementById('lbl-teamtotal').textContent=t.teamTotal+':';
  document.getElementById('lbl-banktotal').textContent=t.bankTotal+':';
  if(DATA.length>0)renderAll(DATA,currentSettings);
}

db.collection('leaderboard').doc('photos').onSnapshot(doc=>{

db.collection('leaderboard').doc('current').onSnapshot(doc=>{

    const d=doc.data();
    renderAll((d.employees||[]).sort((a,b)=>b.total-a.total),d.settings||{});

});

db.collection('leaderboard').doc('control').onSnapshot(doc=>{
  if(doc.exists){
    const d=doc.data();
    isPaused=d.scroll==='pause';
    const lang=d.lang||'en';
    if(lang!==currentLang){currentLang=lang;applyLang();}
  }
});

window.addEventListener('resize',()=>{buildSlides();showPage(currentPage);});
setInterval(()=>{const n=new Date();if(n.getHours()===0&&n.getMinutes()===0)location.reload();},60000);
