<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<title>GS1 Saudi Arabia — Employee Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Rajdhani:wght@600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f4f8;font-family:'Sora',sans-serif;color:#0d1f3c}

/* ── HEADER ── */
.header{padding:14px 40px;background:#fff;border-bottom:3px solid #00529b;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;box-shadow:0 2px 12px rgba(0,82,155,0.08)}
.header-left{display:flex;align-items:center;gap:20px}
.logo-img{height:54px;object-fit:contain}
.divider{width:2px;height:44px;background:linear-gradient(180deg,#00529b,#e3231c);border-radius:2px;opacity:0.4}
.title-block .title{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:#00529b;letter-spacing:2px}
.title-block .sub{font-size:11px;color:#7a9ab5;letter-spacing:3px;margin-top:1px;text-transform:uppercase}
.hright{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.clock{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:#0d1f3c}
.pills{display:flex;gap:8px}
.pill{background:#f0f4f8;border:1.5px solid #d0dce8;border-radius:20px;padding:4px 14px;font-size:12px;color:#5a7a99;font-weight:600}
.pill span{color:#00529b;font-weight:700}

/* ── PODIUM ── */
.podium-section{padding:12px 40px 14px;background:#fff;border-bottom:2px solid #e0e8f0;flex-shrink:0;box-shadow:0 2px 8px rgba(0,82,155,0.05)}
.slabel{font-size:10px;letter-spacing:3px;color:#7a9ab5;text-align:center;margin-bottom:10px;text-transform:uppercase;font-weight:700}
.podium{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:12px;max-width:920px;margin:0 auto;align-items:end}
.pc{border-radius:14px;padding:12px 10px;text-align:center;border:2px solid}
.pc.p1{background:linear-gradient(145deg,#fff7e0,#fffbf0);border-color:#f5c842;padding:18px 10px;box-shadow:0 4px 20px rgba(245,200,66,0.25)}
.pc.p2{background:linear-gradient(145deg,#e8f0fa,#f0f6ff);border-color:#00529b;box-shadow:0 2px 10px rgba(0,82,155,0.12)}
.pc.p3{background:linear-gradient(145deg,#fff2e8,#fff8f0);border-color:#e3231c;box-shadow:0 2px 10px rgba(227,35,28,0.10)}
.medal{font-size:26px;display:block;margin-bottom:5px}
.pc-lbl{font-size:10px;letter-spacing:2px;color:#7a9ab5;margin-bottom:3px;text-transform:uppercase;font-weight:700}
.pc-name{font-family:'Cairo',sans-serif;font-size:19px;font-weight:900;direction:rtl;margin-bottom:5px;color:#0d1f3c}
.p1 .pc-name{color:#b8860b;font-size:22px}
.p2 .pc-name{color:#00529b}
.p3 .pc-name{color:#e3231c}
.pc-earn{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700}
.p1 .pc-earn{color:#b8860b}
.p2 .pc-earn{color:#00529b}
.p3 .pc-earn{color:#e3231c}

/* ── SCROLL LIST ── */
.list-area{position:fixed;left:0;right:0;overflow:hidden}
.list-inner{display:flex;flex-direction:column;gap:6px;padding:10px 40px;animation:scrollUp linear infinite}
@keyframes scrollUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}

.row{background:#fff;border:1.5px solid #d0dce8;border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:12px;direction:rtl;transition:box-shadow .2s}
.row.hi{background:linear-gradient(90deg,#f0fff4,#f8fff5);border-color:#34a853}
.row.zero{background:#f8fafc;border-color:#e8eef5;opacity:0.7}

.rnum{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;min-width:36px;text-align:center;color:#a0b5c8;direction:ltr}
.rnum.gold{color:#d4a800}
.rbar-wrap{width:120px;height:5px;background:#e8eef5;border-radius:99px;overflow:hidden;flex-shrink:0}
.rbar{height:100%;border-radius:99px}
.rname{font-family:'Cairo',sans-serif;font-size:18px;font-weight:700;direction:rtl;flex:1;text-align:right;color:#0d1f3c}
.row.hi .rname{color:#1a7a3c}
.row.zero .rname{color:#a0b5c8}
.rearn{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;min-width:130px;text-align:right;flex-shrink:0}
.row.zero .rearn{color:#c0cdd8}

/* ── FOOTER TICKER ── */
.footer{position:fixed;bottom:0;left:0;right:0;background:#00529b;border-top:2px solid #0066c0;padding:7px 0;overflow:hidden}
.ticker-inner{display:flex;gap:50px;white-space:nowrap;animation:ticker 50s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.titem{font-size:13px;color:rgba(255,255,255,0.7);flex-shrink:0;font-family:'Cairo',sans-serif}
.titem b{color:#f5c842;font-family:'Rajdhani',sans-serif}
.titem.tz{color:rgba(255,255,255,0.3)}
.titem.tz b{color:rgba(255,255,255,0.25)}
</style>
</head>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC5hcg2loY4VNzcmNATPIUBCVNTQKGTSro",
  authDomain: "gs1-leaderboard.firebaseapp.com",
  projectId: "gs1-leaderboard",
  storageBucket: "gs1-leaderboard.firebasestorage.app",
  messagingSenderId: "923262340454",
  appId: "1:923262340454:web:d9ef6cd46d10fe5fd40ca7",
  measurementId: "G-E14DR9BZQ8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const COLORS=['#00529b','#e3231c','#34a853','#7b2d8b','#0288d1','#f57c00','#00796b','#558b2f','#c62828','#6a1f96'];

function fmt(n){return n===0?'٠ ريال':n.toLocaleString('en-US')+' ريال';}

setInterval(()=>{ document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB'); },1000);

function renderAll(DATA, settings){
  const empCount = settings.totalEmployees || DATA.length;
  document.getElementById('ttotal').textContent = DATA.reduce((s,e)=>s+e.total,0).toLocaleString('en-US')+' ريال';
  document.querySelector('.pill span').textContent = empCount;

  // Update header subtitle
  if(settings.month || settings.year){
    document.querySelector('.title-block .sub').textContent =
      (settings.month||'') + ' ' + (settings.year||'') + ' — Monthly Earnings';
  }

  // Podium top 3
  const top3 = DATA.slice(0,3);
  const order = [top3[1], top3[0], top3[2]];
  const medals = ['🥈','🥇','🥉'];
  const pcls = ['p2','p1','p3'];
  const plbls = ['2nd Place','1st Place','3rd Place'];
  document.getElementById('podium').innerHTML = order.map((e,i) => e ? `
    <div class="pc ${pcls[i]}">
      <span class="medal">${medals[i]}</span>
      <div class="pc-lbl">${plbls[i]}</div>
      <div class="pc-name">${e.name}</div>
      <div class="pc-earn">${fmt(e.total)}</div>
    </div>` : '').join('');

  // Rows
  const maxE = DATA[0] ? DATA[0].total : 1;
  function makeRows(arr){
    return arr.map((e,i)=>{
      const rank=i+1;
      const ci=i%COLORS.length;
      const pct=maxE>0?Math.round(e.total/maxE*100):0;
      const isZero=e.total===0;
      const isHi=rank<=10&&!isZero;
      const color=isZero?'#c0cdd8':COLORS[ci];
      return `<div class="row${isHi?' hi':''}${isZero?' zero':''}">
        <div class="rnum${rank<=3?' gold':''}">${rank}</div>
        <div class="rname">${e.name}</div>
        <div class="rbar-wrap"><div class="rbar" style="width:${pct}%;background:${color}"></div></div>
        <div class="rearn" style="color:${color}">${fmt(e.total)}</div>
      </div>`;
    }).join('');
  }

  const li = document.getElementById('list-inner');
  li.innerHTML = makeRows(DATA) + makeRows(DATA);

  // Ticker
  const tHTML = DATA.map(e=>`<span class="titem${e.total===0?' tz':''}">${e.name} <b>${fmt(e.total)}</b></span>`).join('<span style="color:rgba(255,255,255,0.2);margin:0 8px">|</span>');
  document.getElementById('ticker').innerHTML = tHTML + '<span style="margin:0 20px;color:rgba(255,255,255,0.2)">|||</span>' + tHTML;

  setTimeout(layout, 400);
}

function layout(){
  const hh=document.querySelector('.header').offsetHeight;
  const ph=document.querySelector('.podium-section').offsetHeight;
  const fh=document.querySelector('.footer').offsetHeight;
  const la=document.getElementById('list-area');
  la.style.top=(hh+ph)+'px';
  la.style.bottom=fh+'px';
  const li=document.getElementById('list-inner');
  const h=li.scrollHeight/2;
  li.style.animationDuration=Math.max(30,h/30)+'s';
}
window.addEventListener('resize', layout);

// Live Firestore listener — updates instantly when admin publishes
db.collection('leaderboard').doc('current').onSnapshot(doc => {
  if(doc.exists){
    const d = doc.data();
    const DATA = (d.employees || []).sort((a,b) => b.total - a.total);
    const settings = d.settings || {};
    renderAll(DATA, settings);
  }
});

setInterval(()=>{const n=new Date();if(n.getHours()===0&&n.getMinutes()===0)location.reload();},60000);
</script>
